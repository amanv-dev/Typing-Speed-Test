<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Typing Speed Test</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="panel">
      <div class="top-row">
        <div id="timeControls" class="pill-row">
          <button class="pill active" data-time="60">1m</button>
          <button class="pill" data-time="180">3m</button>
          <button class="pill" data-time="300">5m</button>
        </div>

        <div class="right-controls">
          <div class="select-wrap">
            <span class="select-label">Text</span>
            <select id="textLength">
              <option value="60">Normal</option>
              <option value="90" selected>Fast</option>
              <option value="120">Pro</option>
            </select>
          </div>

          <button id="themeToggle" class="btn">Dark</button>
          <button id="restartTop" class="btn ghost" title="Restart (Esc)">Restart</button>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="label">Time</div>
          <div class="value"><span id="time">60</span>s</div>
        </div>
        <div class="stat">
          <div class="label">WPM</div>
          <div class="value"><span id="wpm">0</span></div>
        </div>
        <div class="stat">
          <div class="label">Accuracy</div>
          <div class="value"><span id="accuracy">100%</span></div>
        </div>
        <div class="stat">
          <div class="label">Best</div>
          <div class="value" id="personalBest">--</div>
        </div>
      </div>

      <div class="typing-card" id="typingCard">
        <div id="textDisplay" class="text-display"></div>
        <div class="hint">Click the typing area and start typing • Press <b>Esc</b> to restart</div>
      </div>

      <input type="text" id="hiddenInput" autocomplete="off" />

      <!-- CENTER POPUP MODAL -->
      <div id="resultModal" class="modal hidden" role="dialog" aria-modal="true">
        <div class="modal-card">
          <div class="modal-title">Results</div>
          <div id="finalStats" class="modal-stats"></div>
          <div class="modal-actions">
            <button id="restartBtn" class="btn">Try again</button>
          </div>
        </div>
      </div>

    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
